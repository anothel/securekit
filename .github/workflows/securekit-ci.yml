name: SecureKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.compiler }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            build_type: Release
          - os: ubuntu-latest
            compiler: clang
            build_type: Release
          - os: ubuntu-latest
            compiler: gcc
            build_type: Debug
          - os: windows-latest
            compiler: msvc
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ninja-build

      - name: Install Windows dependencies
        if: matrix.compiler == 'msvc'
        run: vcpkg install openssl:x64-windows

      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      # Linux uses runner packages and Windows uses vcpkg; add explicit OpenSSL 3.5 coverage later if needed.
      - name: Configure CMake (GCC)
        if: matrix.compiler == 'gcc'
        env:
          CC: gcc
          CXX: g++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSECUREKIT_BUILD_TESTS=ON

      - name: Configure CMake (Clang)
        if: matrix.compiler == 'clang'
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSECUREKIT_BUILD_TESTS=ON

      - name: Configure CMake (MSVC)
        if: matrix.compiler == 'msvc'
        run: >
          cmake -S . -B build -DSECUREKIT_BUILD_TESTS=ON
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DSECUREKIT_OPENSSL_RUNTIME_DIR="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"

      - name: Build and test
        run: cmake --build build --config ${{ matrix.build_type }} --target check

      - name: Package check
        run: cmake --build build --config ${{ matrix.build_type }} --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: securekit-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-packages
          path: build/package-check/artifacts/*

  install-only:
    name: ubuntu-latest gcc Release install-only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ninja-build

      - name: Configure CMake
        env:
          CC: gcc
          CXX: g++
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DSECUREKIT_BUILD_TESTS=OFF

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: securekit-ubuntu-gcc-release-install-only-packages
          path: build/package-check/artifacts/*

      - name: Verify package files
        run: |
          test -f "${{ github.workspace }}/build/package-check/install/bin/securekit"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfig.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfigVersion.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets-release.cmake"

  linux-static:
    name: ubuntu-latest gcc Release static
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ninja-build

      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-gcc-Release-static-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-gcc-Release-static-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      - name: Configure CMake
        env:
          CC: gcc
          CXX: g++
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DSECUREKIT_BUILD_TESTS=ON

      - name: Build and test
        run: cmake --build build --config Release --target check

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: securekit-ubuntu-gcc-release-static-packages
          path: build/package-check/artifacts/*

      - name: Verify static package files
        run: |
          test -f "${{ github.workspace }}/build/package-check/install/bin/securekit"
          test -f "${{ github.workspace }}/build/package-check/install/lib/libsecurekit.a"
          test ! -f "${{ github.workspace }}/build/package-check/install/lib/libsecurekit.so"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfig.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfigVersion.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets-release.cmake"

  windows-shared:
    name: windows-latest msvc Release shared
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Windows dependencies
        run: vcpkg install openssl:x64-windows

      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-msvc-Release-shared-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-msvc-Release-shared-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DBUILD_SHARED_LIBS=ON
          -DSECUREKIT_BUILD_TESTS=ON
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DSECUREKIT_OPENSSL_RUNTIME_DIR="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"

      - name: Build and test
        run: cmake --build build --config Release --target check

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: securekit-windows-msvc-release-shared-packages
          path: build/package-check/artifacts/*

      - name: Verify shared package files
        shell: pwsh
        run: |
          $files = @(
            "${{ github.workspace }}/build/package-check/install/bin/securekit.exe",
            "${{ github.workspace }}/build/package-check/install/bin/securekit.dll",
            "${{ github.workspace }}/build/package-check/install/lib/securekit.lib",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfig.cmake",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfigVersion.cmake",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets.cmake",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets-release.cmake"
          )
          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Missing $file"
            }
          }
