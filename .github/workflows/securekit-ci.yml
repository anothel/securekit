name: SecureKit CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.compiler }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            build_type: Release
          - os: ubuntu-latest
            compiler: clang
            build_type: Release
          - os: ubuntu-latest
            compiler: gcc
            build_type: Debug
          - os: windows-latest
            compiler: msvc
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ninja-build

      - name: Install Windows dependencies
        if: matrix.compiler == 'msvc'
        run: vcpkg install openssl:x64-windows

      - name: Cache GoogleTest
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: ${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      # Linux uses runner packages and Windows uses vcpkg; add explicit OpenSSL 3.5 coverage later if needed.
      - name: Configure CMake (GCC)
        if: matrix.compiler == 'gcc'
        env:
          CC: gcc
          CXX: g++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSECUREKIT_BUILD_TESTS=ON -DSECUREKIT_WARNINGS_AS_ERRORS=ON

      - name: Configure CMake (Clang)
        if: matrix.compiler == 'clang'
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSECUREKIT_BUILD_TESTS=ON -DSECUREKIT_WARNINGS_AS_ERRORS=ON

      - name: Configure CMake (MSVC)
        if: matrix.compiler == 'msvc'
        run: >
          cmake -S . -B build -DSECUREKIT_BUILD_TESTS=ON
          -DSECUREKIT_WARNINGS_AS_ERRORS=ON
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DSECUREKIT_OPENSSL_RUNTIME_DIR="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"

      - name: Build and test
        run: cmake --build build --config ${{ matrix.build_type }} --target check

      - name: Package check
        run: cmake --build build --config ${{ matrix.build_type }} --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: securekit-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-packages
          path: build/package-check/artifacts/*

  install-only:
    name: ubuntu-latest gcc Release install-only
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ninja-build

      - name: Configure CMake
        env:
          CC: gcc
          CXX: g++
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DSECUREKIT_BUILD_TESTS=OFF
          -DSECUREKIT_WARNINGS_AS_ERRORS=ON

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: securekit-ubuntu-gcc-release-install-only-packages
          path: build/package-check/artifacts/*

      - name: Verify package files
        run: |
          test -f "${{ github.workspace }}/build/package-check/install/bin/securekit"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfig.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfigVersion.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets-release.cmake"

  linux-static:
    name: ubuntu-latest gcc Release static
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ninja-build

      - name: Cache GoogleTest
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: ${{ runner.os }}-gcc-Release-static-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-gcc-Release-static-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      - name: Configure CMake
        env:
          CC: gcc
          CXX: g++
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_SHARED_LIBS=OFF
          -DSECUREKIT_BUILD_TESTS=ON
          -DSECUREKIT_WARNINGS_AS_ERRORS=ON

      - name: Build and test
        run: cmake --build build --config Release --target check

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: securekit-ubuntu-gcc-release-static-packages
          path: build/package-check/artifacts/*

      - name: Verify static package files
        run: |
          test -f "${{ github.workspace }}/build/package-check/install/bin/securekit"
          test -f "${{ github.workspace }}/build/package-check/install/lib/libsecurekit.a"
          test ! -f "${{ github.workspace }}/build/package-check/install/lib/libsecurekit.so"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfig.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfigVersion.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets.cmake"
          test -f "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets-release.cmake"

  windows-shared:
    name: windows-latest msvc Release shared
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Windows dependencies
        run: vcpkg install openssl:x64-windows

      - name: Cache GoogleTest
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: ${{ runner.os }}-msvc-Release-shared-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-msvc-Release-shared-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DBUILD_SHARED_LIBS=ON
          -DSECUREKIT_BUILD_TESTS=ON
          -DSECUREKIT_WARNINGS_AS_ERRORS=ON
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DSECUREKIT_OPENSSL_RUNTIME_DIR="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"

      - name: Build and test
        run: cmake --build build --config Release --target check

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: securekit-windows-msvc-release-shared-packages
          path: build/package-check/artifacts/*

      - name: Verify shared package files
        shell: pwsh
        run: |
          $files = @(
            "${{ github.workspace }}/build/package-check/install/bin/securekit.exe",
            "${{ github.workspace }}/build/package-check/install/bin/securekit.dll",
            "${{ github.workspace }}/build/package-check/install/lib/securekit.lib",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfig.cmake",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitConfigVersion.cmake",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets.cmake",
            "${{ github.workspace }}/build/package-check/install/lib/cmake/securekit/securekitTargets-release.cmake"
          )
          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Missing $file"
            }
          }

  linux-sanitizers:
    name: ubuntu-latest clang Debug sanitizers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libssl-dev ninja-build

      - name: Cache GoogleTest
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: ${{ runner.os }}-clang-Debug-sanitizer-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-clang-Debug-sanitizer-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      - name: Configure CMake
        env:
          CC: clang
          CXX: clang++
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DSECUREKIT_BUILD_TESTS=ON
          -DSECUREKIT_WARNINGS_AS_ERRORS=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build and test
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: cmake --build build --config Debug --target check

  macos-package:
    name: macos-latest appleclang Release package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install macOS dependencies
        run: brew install ninja openssl@3

      - name: Cache GoogleTest
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: ${{ runner.os }}-appleclang-Release-googletest-v1.14.0-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-appleclang-Release-googletest-v1.14.0-
            ${{ runner.os }}-googletest-v1.14.0-

      - name: Configure CMake
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DSECUREKIT_BUILD_TESTS=ON
          -DSECUREKIT_WARNINGS_AS_ERRORS=ON
          -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)"

      - name: Build and test
        run: cmake --build build --config Release --target check

      - name: Package check
        run: cmake --build build --config Release --target package-check

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: securekit-macos-clang-release-packages
          path: build/package-check/artifacts/*

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, install-only, linux-static, windows-shared, linux-sanitizers, macos-package]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s globstar nullglob
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ ! "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag is not SemVer: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          declare -A copied_source
          expected_source_zip="securekit-${tag_version}-source.zip"
          expected_source_tgz="securekit-${tag_version}-source.tar.gz"
          expected_binary_artifacts=(
            "securekit-ubuntu-latest-gcc-Release-packages"
            "securekit-ubuntu-latest-clang-Release-packages"
            "securekit-ubuntu-latest-gcc-Debug-packages"
            "securekit-windows-latest-msvc-Release-packages"
            "securekit-ubuntu-gcc-release-install-only-packages"
            "securekit-ubuntu-gcc-release-static-packages"
            "securekit-windows-msvc-release-shared-packages"
            "securekit-macos-clang-release-packages"
          )
          expected_binary_suffixes=(".zip" ".tar.gz")
          for artifact in release-artifacts/**/*; do
            if [[ ! -f "$artifact" ]]; then
              continue
            fi

            base="$(basename "$artifact")"
            artifact_name="$(basename "$(dirname "$artifact")")"
            if [[ "$base" != securekit-"$tag_version"-* ]]; then
              echo "Release artifact version does not match tag ${GITHUB_REF_NAME}: $base" >&2
              exit 1
            fi

            if [[ "$base" == *-source.* ]]; then
              if [[ -z "${copied_source[$base]+x}" ]]; then
                cp "$artifact" "dist/$base"
                copied_source[$base]=1
              fi
              continue
            fi

            cp "$artifact" "dist/${artifact_name}-${base}"
          done

          if [[ ! -f "dist/$expected_source_zip" ]]; then
            echo "No source ZIP package artifact found: $expected_source_zip" >&2
            exit 1
          fi
          if [[ ! -f "dist/$expected_source_tgz" ]]; then
            echo "No source TGZ package artifact found: $expected_source_tgz" >&2
            exit 1
          fi
          for expected_binary_artifact in "${expected_binary_artifacts[@]}"; do
            for expected_binary_suffix in "${expected_binary_suffixes[@]}"; do
              expected_binary_matches=(dist/"${expected_binary_artifact}-securekit-${tag_version}-"*"$expected_binary_suffix")
              if [[ "${#expected_binary_matches[@]}" -eq 0 ]]; then
                echo "No binary $expected_binary_suffix package artifact found for $expected_binary_artifact" >&2
                exit 1
              fi
            done
          done

          find dist -maxdepth 1 -type f -print | sort
          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="SecureKit ${tag}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title"
          else
            gh release create "$tag" --verify-tag --title "$title" --generate-notes
          fi

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber
