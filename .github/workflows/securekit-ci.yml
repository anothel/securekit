name: SecureKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }} ${{ matrix.compiler }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            build_type: Release
          - os: ubuntu-latest
            compiler: clang
            build_type: Release
          - os: ubuntu-latest
            compiler: gcc
            build_type: Debug
          - os: windows-latest
            compiler: msvc
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev ninja-build

      - name: Install Windows dependencies
        if: matrix.compiler == 'msvc'
        run: vcpkg install openssl:x64-windows

      # Linux uses runner packages and Windows uses vcpkg; add explicit OpenSSL 3.5 coverage later if needed.
      - name: Configure CMake (GCC)
        if: matrix.compiler == 'gcc'
        env:
          CC: gcc
          CXX: g++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSECUREKIT_BUILD_TESTS=ON

      - name: Configure CMake (Clang)
        if: matrix.compiler == 'clang'
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DSECUREKIT_BUILD_TESTS=ON

      - name: Configure CMake (MSVC)
        if: matrix.compiler == 'msvc'
        run: >
          cmake -S . -B build -DSECUREKIT_BUILD_TESTS=ON
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DSECUREKIT_OPENSSL_RUNTIME_DIR="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Install
        run: cmake --install build --config ${{ matrix.build_type }} --prefix "${{ github.workspace }}/install"

      - name: Configure consumer
        if: matrix.compiler != 'msvc'
        run: cmake -S tests/consumer -B consumer-build -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install"

      - name: Configure consumer (MSVC)
        if: matrix.compiler == 'msvc'
        run: >
          cmake -S tests/consumer -B consumer-build
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install"
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build consumer
        run: cmake --build consumer-build --config ${{ matrix.build_type }}
